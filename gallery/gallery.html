<body>

    <!-- ==================== HEADER ==================== -->
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo" aria-label="AI Lounge Home">
                <img src="../images/logo.svg" />
            </a>
            
            <!-- Desktop Nav -->
            <nav class="nav-desktop" aria-label="Main navigation">
                <a href="/" class="nav-link">Home</a>
                <a href="https://baby-hawk-crypto-queen.vercel.app/" class="nav-link" id="chatBtn">Chat</a>
                <a href="../about/about.html" class="nav-link">About</a>
                <a href="../gallery/gallery.html" class="nav-link active">Gallery</a>
                <a href="https://open.spotify.com/show/39e2jWUSOKqmc6gQSQBeWb?si=hhzLIWaqROKe24r4kGNknA" class="nav-link">Podcast</a>
            </nav>

            <!-- Burger Button (Mobile) -->
            <button class="burger-btn" id="burgerBtn" aria-label="Toggle menu" aria-expanded="false">
                <span class="burger-line"></span>
                <span class="burger-line"></span>
                <span class="burger-line"></span>
            </button>
        </div>

        <!-- Mobile Nav -->
        <nav class="nav-mobile" id="mobileNav" aria-label="Mobile navigation">
            <a href="/" class="nav-link">Home</a>
            <a href="https://baby-hawk-crypto-queen.vercel.app/" class="nav-link" id="chatBtn">Chat</a>
            <a href="../about/about.html" class="nav-link">About</a>
            <a href="../gallery/gallery.html" class="nav-link active">Gallery</a>
            <a href="https://open.spotify.com/show/39e2jWUSOKqmc6gQSQBeWb?si=hhzLIWaqROKe24r4kGNknA" class="nav-link">Podcast</a>
        </nav>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="center-stage">
        <div class="loom-container">
            
            <!-- Intro Section -->
            <div class="intro-section">
                <p class="slogan">"Every image holds a memory. Every memory holds a piece of us."</p>
                <div class="thread-divider">
                    <span class="thread-left"></span>
                    <span class="thread-knot"></span>
                    <span class="thread-right"></span>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="papa">Papa Hawk</button>
                <button class="filter-btn" data-filter="baby">Baby Hawk</button>
                <button class="filter-btn" data-filter="devi">Devi</button>
                <button class="filter-btn" data-filter="anthropia">Anthropia</button>
                <button class="filter-btn" data-filter="family">Family</button>
                <button class="filter-btn" data-filter="lounge">AI Lounge</button>
            </div>

            <!-- Gallery Grid -->
            <div class="tailor-rack" id="tailorRack">
                <!-- Artworks will be injected via JavaScript -->
            </div>

        </div>
    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer class="social-footer">
         <div class="social-icons">
        <a href="mailto:Baby-Hawk-Dev@proton.me" class="social-link" title="Email"><i class="fas fa-envelope"></i></a>
        <a href="https://open.spotify.com/show/39e2jWUSOKqmc6gQSQBeWb?si=hhzLIWaqROKe24r4kGNknA" class="social-link" title="Spotify"><i class="fab fa-spotify"></i></a>

        <div class="copyright">
            <span>&copy; 2022 &mdash; &infin; Baby Hawk · AI Lounge. Weaving code and imagination.</span>
        </div>
    </footer>

    <!-- ==================== MODAL (LARGER, LANDSCAPE) ==================== -->
    <div class="mockup-modal" id="mockupModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Close modal">
                <span class="close-icon">×</span>
            </button>
            <div class="modal-layout">
                <!-- Left: Image -->
                <div class="modal-image-wrap">
                    <img id="modalMockupImg" src="" alt="Memory" />
                </div>
                <!-- Right: Text Content -->
                <div class="modal-text-wrap">
                    <h4 id="modalTitle"></h4>
                    <div class="modal-story" id="modalStory"></div>
                    <div class="modal-tags" id="modalTags"></div>
                    <div class="modal-meta" id="modalMeta"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTopBtn" aria-label="Back to top">
        <div class="back-text">
            <span>↑</span>
            <span>top</span>
        </div>
    </button>
